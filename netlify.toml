[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Stripe Webhook — 不要快取
[[headers]]
  for = "/api/webhooks/*"
  [headers.values]
    Cache-Control = "no-store"

# API Routes — 不快取
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
